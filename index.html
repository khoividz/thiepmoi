<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thiệp mời sinh nhật | Huy Hoàng</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Intro Overlay -->
    <div id="introOverlay" class="intro-overlay active">
        <div class="intro-content">
            <p id="typingText" class="typing-text"></p>
        </div>
    </div>

    <!-- Main Invitation Wrapper -->
    <div id="mainContent" class="main-content">
        <!-- Bokeh Background -->
        <div class="bokeh-bg">
            <div class="bokeh-circle"></div>
            <div class="bokeh-circle"></div>
            <div class="bokeh-circle"></div>
            <div class="bokeh-circle"></div>
            <div class="bokeh-circle"></div>
            <div class="bokeh-circle"></div>
            <div class="bokeh-circle"></div>
            <div class="bokeh-circle"></div>
        </div>

        <!-- Floating Particles Container -->
        <div id="particlesContainer" class="particles-container"></div>

        <!-- Confetti Canvas -->
        <canvas id="confettiCanvas" class="confetti-canvas"></canvas>

        <div class="container">
            <!-- Glass Card -->
            <div id="invitationCard" class="invitation-card">
                <div class="card-left">
                    <div class="text-content">
                        <h1 class="main-title">Thiệp mời sinh nhật 🎂</h1>
                        
                        <div id="invitationDetails" class="invitation-details hidden">
                            <div class="message-block delay-1">
                                <p>Huy Hoàng trân trọng mời tất cả anh em đến tụ họp vui vẻ,</p>
                                <p>ăn uống, nói chuyện và quẩy</p>
                            </div>
                            <div class="message-block delay-2">
                                <p>Sự có mặt của mọi người là niềm vui lớn nhất.</p>
                                <p>Đến chung vui cho đông đủ nhé.</p>
                            </div>
                            <div class="message-block delay-3">
                                <p>Hứa hẹn một buổi tối cực kỳ vui và đáng nhớ</p>
                            </div>
                            <div class="footer-note delay-4">
                                <p>Rất mong được gặp mọi người!</p>
                            </div>
                        </div>

                        <button id="openButton" class="open-button">
                            <span class="button-text">Mở thiệp..</span>
                            <span class="button-icon">✨</span>
                        </button>
                    </div>
                </div>
                
                <div class="card-right">
                    <div id="cupcakeImage" class="cupcake-wrapper">
                        <img src="https://phunugioi.com/wp-content/uploads/2020/04/hinh-anh-banh-sinh-nhat-dep-ngo-nghinh-y-nghia.jpg" 
                             alt="Happy birthday Huy Hoàng" 
                             class="cupcake-img"
                             draggable="false">
                        <div class="sparkle sparkle-1">✨</div>
                        <div class="sparkle sparkle-2">⭐</div>
                        <div class="sparkle sparkle-3">💖</div>
                        <div class="sparkle sparkle-4">🌟</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
